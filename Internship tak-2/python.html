<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Cipher</title>
<style>
  :root {
    --paper: #f4ede0;
    --paper-dark: #e7dcc6;
    --ink: #241f1b;
    --ink-soft: #5b5346;
    --teal: #2f6f6b;
    --amber: #c98a3f;
    --line: #d9cdb5;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 50px 20px 70px;
    background-color: var(--paper);
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 26px 26px;
    background-position: -1px -1px;
    color: var(--ink);
    font-family: Georgia, 'Times New Roman', serif;
    display: flex;
    justify-content: center;
  }

  .page {
    width: 100%;
    max-width: 920px;
    background-color: var(--paper);
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }

  .eyebrow {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    letter-spacing: 4px;
    color: var(--teal);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  h1 {
    font-size: 38px;
    font-weight: normal;
    margin: 0 0 8px;
    letter-spacing: 0.5px;
  }

  header p {
    font-family: Arial, sans-serif;
    font-size: 13px;
    color: var(--ink-soft);
    margin: 0;
  }

  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 30px;
    align-items: start;
  }

  /* --- Control panel --- */
  .panel {
    background-color: #fbf7ee;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 24px;
  }

  label {
    display: block;
    font-family: Arial, sans-serif;
    font-size: 11px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }

  .upload-box {
    border: 1.5px dashed var(--line);
    border-radius: 4px;
    padding: 18px;
    text-align: center;
    font-family: Arial, sans-serif;
    font-size: 13px;
    color: var(--ink-soft);
    cursor: pointer;
    margin-bottom: 20px;
    background-color: #fffdf7;
    transition: border-color 0.15s ease;
  }

  .upload-box:hover {
    border-color: var(--teal);
    color: var(--teal);
  }

  input[type="file"] { display: none; }

  select, input[type="number"] {
    width: 100%;
    font-family: Arial, sans-serif;
    font-size: 14px;
    padding: 9px 10px;
    border: 1px solid var(--line);
    border-radius: 3px;
    background-color: #fffdf7;
    color: var(--ink);
    margin-bottom: 18px;
  }

  select:focus, input:focus, button:focus {
    outline: 2px solid var(--teal);
    outline-offset: 1px;
  }

  .key-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 6px;
  }

  .key-row input[type="range"] {
    flex: 1;
    accent-color: var(--teal);
  }

  .key-value {
    font-family: 'Courier New', monospace;
    font-size: 15px;
    color: var(--teal);
    width: 30px;
    text-align: center;
  }

  .key-hint {
    font-family: Arial, sans-serif;
    font-size: 11px;
    color: var(--ink-soft);
    margin-bottom: 20px;
  }

  .actions {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  button {
    font-family: Arial, sans-serif;
    font-size: 13px;
    letter-spacing: 0.5px;
    padding: 10px 16px;
    border: 1px solid var(--ink);
    border-radius: 3px;
    background-color: var(--ink);
    color: var(--paper);
    cursor: pointer;
    transition: background-color 0.15s ease;
    flex: 1;
  }

  button:hover { background-color: var(--teal); border-color: var(--teal); }

  button.secondary {
    background-color: transparent;
    color: var(--ink);
  }

  button.secondary:hover {
    background-color: var(--paper-dark);
    color: var(--ink);
    border-color: var(--ink);
  }

  #download-btn {
    width: 100%;
    background-color: var(--amber);
    border-color: var(--amber);
    color: #241f1b;
    display: none;
  }

  #download-btn:hover { background-color: #b57a34; }

  /* --- Signature pixel-key demo --- */
  .demo {
    margin-top: 22px;
    padding-top: 18px;
    border-top: 1px dashed var(--line);
  }

  .demo-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 3px;
    margin-top: 10px;
  }

  .demo-cell {
    aspect-ratio: 1;
    border-radius: 2px;
    transition: background-color 0.3s ease;
  }

  /* --- Preview area --- */
  .preview-panel {
    background-color: #fbf7ee;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 24px;
    min-height: 420px;
  }

  .preview-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .preview-slot {
    text-align: center;
  }

  .preview-slot label {
    text-align: center;
  }

  .canvas-frame {
    border: 1px solid var(--line);
    border-radius: 3px;
    background-color: repeating-conic-gradient(#e7dcc6 0% 25%, #f4ede0 0% 50%) 0 0/16px 16px;
    background-color: #fffdf7;
    background-image:
      linear-gradient(45deg, var(--paper-dark) 25%, transparent 25%),
      linear-gradient(-45deg, var(--paper-dark) 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, var(--paper-dark) 75%),
      linear-gradient(-45deg, transparent 75%, var(--paper-dark) 75%);
    background-size: 14px 14px;
    background-position: 0 0, 0 7px, 7px -7px, -7px 0px;
    min-height: 260px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  canvas {
    max-width: 100%;
    max-height: 260px;
    display: block;
  }

  .empty-msg {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: var(--ink-soft);
  }

  .code-panel {
    display: none;
    background-color: #fbf7ee;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 22px 24px;
    margin-top: 26px;
  }

  .code-panel.open { display: block; }

  .code-panel label {
    margin-bottom: 12px;
  }

  .code-panel pre {
    font-family: 'Courier New', monospace;
    font-size: 12.5px;
    line-height: 1.55;
    color: var(--ink);
    background-color: #fffdf7;
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 16px;
    overflow-x: auto;
    margin: 0;
    white-space: pre;
  }

  .footnote {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: var(--ink-soft);
    text-align: center;
    margin-top: 34px;
    letter-spacing: 0.5px;
  }

  @media (max-width: 700px) {
    .layout { grid-template-columns: 1fr; }
    .preview-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="page">

  <header>
    <div class="eyebrow">Pixel &amp; Key</div>
    <h1>Pixel Cipher</h1>
    <p>Scramble an image, one pixel at a time</p>
  </header>

  <div class="layout">

    <div class="panel">
      <label for="file-input">Image</label>
      <div class="upload-box" id="upload-box">Click to choose an image<br>or drop it here</div>
      <input type="file" id="file-input" accept="image/*">

      <label for="operation">Operation</label>
      <select id="operation">
        <option value="xor">XOR each pixel with key</option>
        <option value="add">Add key to each pixel (mod 256)</option>
        <option value="swap">Swap red &amp; blue channels</option>
      </select>

      <label for="key" id="key-label">Key value — <span id="key-echo">77</span></label>
      <div class="key-row">
        <input type="range" id="key" min="0" max="255" value="77">
        <span class="key-value" id="key-num">77</span>
      </div>
      <p class="key-hint" id="key-hint">Same key reverses the effect for XOR. Channel swap needs no key.</p>

      <div class="actions">
        <button onclick="processImage('encrypt')">Encrypt</button>
        <button onclick="processImage('decrypt')">Decrypt</button>
      </div>
      <button class="secondary" onclick="resetAll()" style="width:100%; margin-bottom: 14px;">Clear</button>
      <button id="download-btn" onclick="downloadResult()">Download result</button>

      <div class="demo">
        <label>How the key shifts a pixel</label>
        <div class="demo-grid" id="demo-grid"></div>
      </div>

      <div class="demo">
        <button class="secondary" style="width:100%;" onclick="toggleCode()">View Python equivalent</button>
      </div>
    </div>

    <div class="preview-panel">
      <div class="preview-grid">
        <div class="preview-slot">
          <label>Original</label>
          <div class="canvas-frame" id="original-frame">
            <span class="empty-msg">No image loaded</span>
          </div>
        </div>
        <div class="preview-slot">
          <label>Result</label>
          <div class="canvas-frame" id="result-frame">
            <span class="empty-msg">Nothing processed yet</span>
          </div>
        </div>
      </div>
    </div>

  </div>

  <div class="code-panel" id="code-panel">
    <label>Python equivalent (Pillow)</label>
    <pre id="python-code"></pre>
  </div>

  <p class="footnote">Processing happens entirely in your browser — nothing is uploaded</p>

</div>

<script>
  const fileInput = document.getElementById('file-input');
  const uploadBox = document.getElementById('upload-box');
  const originalFrame = document.getElementById('original-frame');
  const resultFrame = document.getElementById('result-frame');
  const keyInput = document.getElementById('key');
  const keyNum = document.getElementById('key-num');
  const keyEcho = document.getElementById('key-echo');
  const opSelect = document.getElementById('operation');
  const keyHint = document.getElementById('key-hint');
  const downloadBtn = document.getElementById('download-btn');

  let originalCanvas = null;
  let resultCanvas = null;

  uploadBox.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) loadImage(file);
  });

  uploadBox.addEventListener('dragover', (e) => { e.preventDefault(); uploadBox.style.borderColor = '#2f6f6b'; });
  uploadBox.addEventListener('dragleave', () => { uploadBox.style.borderColor = ''; });
  uploadBox.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadBox.style.borderColor = '';
    const file = e.dataTransfer.files[0];
    if (file) loadImage(file);
  });

  function loadImage(file) {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      originalCanvas = canvas;
      originalFrame.innerHTML = '';
      originalFrame.appendChild(canvas);
      resultFrame.innerHTML = '<span class="empty-msg">Nothing processed yet</span>';
      downloadBtn.style.display = 'none';
      resultCanvas = null;
    };
    img.src = URL.createObjectURL(file);
  }

  keyInput.addEventListener('input', (e) => {
    keyNum.textContent = e.target.value;
    keyEcho.textContent = e.target.value;
    drawDemo();
  });

  opSelect.addEventListener('change', () => {
    const isSwap = opSelect.value === 'swap';
    keyInput.disabled = isSwap;
    keyHint.textContent = isSwap
      ? 'Channel swap needs no key — encrypt and decrypt use the same action.'
      : (opSelect.value === 'xor'
        ? 'Same key reverses the effect for XOR.'
        : 'Decrypt subtracts the key instead of adding it.');
    drawDemo();
  });

  function transformChannelValue(v, key, op, mode) {
    if (op === 'xor') return v ^ key;
    if (op === 'add') return mode === 'encrypt' ? (v + key) % 256 : (v - key + 256) % 256;
    return v;
  }

  function processImage(mode) {
    if (!originalCanvas) {
      alert('Choose an image first.');
      return;
    }
    const key = parseInt(keyInput.value, 10);
    const op = opSelect.value;
    const w = originalCanvas.width, h = originalCanvas.height;
    const srcCtx = originalCanvas.getContext('2d');
    const srcData = srcCtx.getImageData(0, 0, w, h);
    const out = document.createElement('canvas');
    out.width = w; out.height = h;
    const outCtx = out.getContext('2d');
    const outData = outCtx.createImageData(w, h);

    const data = srcData.data;
    const dst = outData.data;

    for (let i = 0; i < data.length; i += 4) {
      if (op === 'swap') {
        dst[i] = data[i + 2];
        dst[i + 1] = data[i + 1];
        dst[i + 2] = data[i];
      } else {
        dst[i] = transformChannelValue(data[i], key, op, mode);
        dst[i + 1] = transformChannelValue(data[i + 1], key, op, mode);
        dst[i + 2] = transformChannelValue(data[i + 2], key, op, mode);
      }
      dst[i + 3] = data[i + 3];
    }

    outCtx.putImageData(outData, 0, 0);
    resultCanvas = out;
    resultFrame.innerHTML = '';
    resultFrame.appendChild(out);
    downloadBtn.style.display = 'block';
  }

  function downloadResult() {
    if (!resultCanvas) return;
    const link = document.createElement('a');
    link.download = 'pixel-cipher-result.png';
    link.href = resultCanvas.toDataURL('image/png');
    link.click();
  }

  function resetAll() {
    originalCanvas = null;
    resultCanvas = null;
    originalFrame.innerHTML = '<span class="empty-msg">No image loaded</span>';
    resultFrame.innerHTML = '<span class="empty-msg">Nothing processed yet</span>';
    downloadBtn.style.display = 'none';
    fileInput.value = '';
  }

  // --- Signature demo: shows how sample pixel values shift with the key ---
  const sampleValues = [40, 90, 140, 190, 210, 60, 170, 120, 30, 200, 100, 150, 70, 220, 10, 160];
  function drawDemo() {
    const grid = document.getElementById('demo-grid');
    grid.innerHTML = '';
    const key = parseInt(keyInput.value, 10);
    const op = opSelect.value;
    sampleValues.forEach((v) => {
      const newV = op === 'swap' ? v : transformChannelValue(v, key, op, 'encrypt');
      const cell = document.createElement('div');
      cell.className = 'demo-cell';
      cell.style.backgroundColor = `rgb(${newV}, ${Math.round(newV*0.6)}, ${Math.round(255-newV)})`;
      grid.appendChild(cell);
    });
  }

  drawDemo();

  function toggleCode() {
    document.getElementById('code-panel').classList.toggle('open');
  }

  const pythonSource = `# Pixel Cipher - Simple Image Encryption Tool
# Requires Pillow: pip install Pillow

from PIL import Image
import argparse


def xor_pixels(pixels, key):
    return [
        (r ^ key, g ^ key, b ^ key) + rest
        for (r, g, b, *rest) in pixels
    ]


def add_pixels(pixels, key, mode):
    shift = key if mode == "encrypt" else -key
    return [
        ((r + shift) % 256, (g + shift) % 256, (b + shift) % 256) + rest
        for (r, g, b, *rest) in pixels
    ]


def swap_channels(pixels):
    return [
        (b, g, r) + rest
        for (r, g, b, *rest) in pixels
    ]


def process_image(input_path, output_path, operation, key, mode):
    img = Image.open(input_path)
    img = img.convert("RGBA") if img.mode in ("RGBA", "LA") else img.convert("RGB")
    pixels = list(img.getdata())

    if operation == "xor":
        new_pixels = xor_pixels(pixels, key)
    elif operation == "add":
        new_pixels = add_pixels(pixels, key, mode)
    elif operation == "swap":
        new_pixels = swap_channels(pixels)
    else:
        raise ValueError(f"Unknown operation: {operation}")

    out_img = Image.new(img.mode, img.size)
    out_img.putdata(new_pixels)
    out_img.save(output_path)
    print(f"Saved {mode}ed image to {output_path}")


def main():
    parser = argparse.ArgumentParser(description="Encrypt or decrypt an image using pixel manipulation.")
    parser.add_argument("input", help="Path to the input image")
    parser.add_argument("output", help="Path to save the output image")
    parser.add_argument("--operation", choices=["xor", "add", "swap"], default="xor")
    parser.add_argument("--key", type=int, default=77)
    parser.add_argument("--mode", choices=["encrypt", "decrypt"], default="encrypt")
    args = parser.parse_args()

    process_image(args.input, args.output, args.operation, args.key, args.mode)


if __name__ == "__main__":
    main()
`;

  document.getElementById('python-code').textContent = pythonSource;
</script>

</body>
</html>
